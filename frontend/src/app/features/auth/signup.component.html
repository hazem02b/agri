<div class="min-h-screen bg-gradient-to-br from-primary/5 via-white to-secondary/5 flex items-center justify-center p-4 py-12">
  <div class="w-full max-w-2xl relative z-10">
    <div class="text-center mb-8">
      <button routerLink="/" class="inline-flex items-center gap-2 text-gray-600 hover:text-primary transition-colors mb-6">
        <span class="text-xl">←</span>
        <span>Retour à l'accueil</span>
      </button>
      <h1 class="text-3xl font-bold text-gray-900 mb-2">Créer un compte</h1>
      <p class="text-gray-600">Rejoignez AgriConnect 🇹🇳</p>
    </div>

    <div class="bg-white rounded-3xl shadow-2xl border-2 border-gray-100 overflow-hidden">
      <div class="p-8">
        <form (ngSubmit)="onSubmit()" class="space-y-6">
          <div *ngIf="error" class="bg-red-50 border-2 border-red-200 rounded-xl p-4">
            <p class="text-sm text-red-600">{{error}}</p>
          </div>

          <div *ngIf="currentStep === 1" class="space-y-6">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-3">Type de compte</label>
              <div class="grid grid-cols-2 gap-4">
                <button type="button" (click)="userType = 'BUYER'" 
                  class="p-4 border-2 rounded-xl" [class.border-primary]="userType === 'BUYER'">
                  <div>Acheteur</div>
                </button>
                <button type="button" (click)="userType = 'FARMER'" 
                  class="p-4 border-2 rounded-xl" [class.border-secondary]="userType === 'FARMER'">
                  <div>Agriculteur</div>
                </button>
              </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Prénom</label>
                <input type="text" [(ngModel)]="firstName" name="firstName" required 
                  class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl" />
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Nom</label>
                <input type="text" [(ngModel)]="lastName" name="lastName" required 
                  class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl" />
              </div>
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
              <input type="email" [(ngModel)]="email" name="email" required 
                class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl" />
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Téléphone</label>
              <input type="tel" [(ngModel)]="phone" name="phone" 
                class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl" />
            </div>

            <div *ngIf="userType === 'FARMER'" class="space-y-4 p-4 bg-secondary/5 rounded-xl">
              <h3 class="font-semibold">Informations ferme</h3>
              <input type="text" [(ngModel)]="farmName" name="farmName" placeholder="Nom de la ferme" 
                class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl" />
            </div>

            <button type="button" (click)="nextStep()" 
              class="w-full py-4 bg-primary text-white rounded-xl font-medium">
              Continuer →
            </button>
          </div>

          <div *ngIf="currentStep === 2" class="space-y-6">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Mot de passe</label>
              <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" 
                name="password" required class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl" />
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Confirmer mot de passe</label>
              <input [type]="showConfirmPassword ? 'text' : 'password'" [(ngModel)]="confirmPassword" 
                name="confirmPassword" required class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl" />
            </div>

            <div>
              <label class="flex items-start gap-3 cursor-pointer">
                <input type="checkbox" [(ngModel)]="acceptTerms" name="acceptTerms" class="mt-1" />
                <span class="text-sm">J'accepte les conditions d'utilisation</span>
              </label>
            </div>

            <div class="flex gap-4">
              <button type="button" (click)="prevStep()" 
                class="flex-1 py-4 border-2 border-gray-200 rounded-xl">
                ← Retour
              </button>
              <button type="submit" [disabled]="loading" 
                class="flex-1 py-4 bg-primary text-white rounded-xl font-medium">
                <span *ngIf="!loading">Créer compte</span>
                <span *ngIf="loading">Création...</span>
              </button>
            </div>
          </div>
        </form>
      </div>

      <div class="bg-gray-50 px-8 py-6 border-t">
        <p class="text-center text-gray-600">
          Vous avez un compte ?
          <a routerLink="/auth/login" class="text-primary font-semibold ml-1">Se connecter →</a>
        </p>
      </div>
    </div>
  </div>
</div>
