<div class="min-h-screen bg-gradient-to-br from-green-50 via-white to-emerald-50 flex items-center justify-center p-4 py-12">
  <div class="w-full max-w-2xl relative z-10">
    <!-- Header -->
    <div class="text-center mb-8">
      <button routerLink="/" class="inline-flex items-center gap-2 text-gray-600 hover:text-green-700 transition-colors mb-6 group">
        <svg class="w-4 h-4 group-hover:-translate-x-0.5 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        <span class="text-sm font-medium">Retour a l'accueil</span>
      </button>
      <div class="flex items-center justify-center gap-3 mb-4">
        <div class="w-12 h-12 bg-gradient-to-br from-green-700 to-green-900 rounded-xl flex items-center justify-center shadow-md">
          <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064"/></svg>
        </div>
      </div>
      <h1 class="text-3xl font-bold text-gray-900 mb-2">Creer un compte</h1>
      <p class="text-gray-500">Rejoignez AgriConnect en Tunisie</p>
    </div>

    <!-- Step Indicator -->
    <div class="flex items-center justify-center gap-3 mb-8">
      <div class="flex items-center gap-2">
        <div [class]="currentStep >= 1 ? 'w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold bg-green-600 text-white' : 'w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold bg-gray-200 text-gray-500'">
          <svg *ngIf="currentStep > 1" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>
          <span *ngIf="currentStep <= 1">1</span>
        </div>
        <span [class]="currentStep >= 1 ? 'text-sm font-medium text-green-700' : 'text-sm text-gray-400'">Informations</span>
      </div>
      <div [class]="currentStep >= 2 ? 'w-12 h-0.5 bg-green-400' : 'w-12 h-0.5 bg-gray-200'"></div>
      <div class="flex items-center gap-2">
        <div [class]="currentStep >= 2 ? 'w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold bg-green-600 text-white' : 'w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold bg-gray-200 text-gray-500'">2</div>
        <span [class]="currentStep >= 2 ? 'text-sm font-medium text-green-700' : 'text-sm text-gray-400'">Securite</span>
      </div>
    </div>

    <div class="bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
      <div class="p-8">
        <form (ngSubmit)="onSubmit()" class="space-y-5">
          <div *ngIf="error" class="bg-red-50 border border-red-200 rounded-xl p-4 flex items-start gap-2">
            <svg class="w-4 h-4 text-red-500 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
            <p class="text-sm text-red-600">{{error}}</p>
          </div>

          <!-- Step 1: Personal Info -->
          <div *ngIf="currentStep === 1" class="space-y-5">
            <div>
              <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">Type de compte</p>
              <div class="grid grid-cols-2 gap-3">
                <button type="button" (click)="userType = 'BUYER'"
                  [class]="userType === 'BUYER' ? 'p-4 border-2 border-green-500 rounded-xl bg-green-50 text-left transition-all' : 'p-4 border-2 border-gray-200 rounded-xl bg-gray-50 hover:border-gray-300 text-left transition-all'">
                  <div class="flex items-center gap-3">
                    <div [class]="userType === 'BUYER' ? 'w-9 h-9 rounded-xl bg-green-100 flex items-center justify-center' : 'w-9 h-9 rounded-xl bg-gray-200 flex items-center justify-center'">
                      <svg [class]="userType === 'BUYER' ? 'w-5 h-5 text-green-600' : 'w-5 h-5 text-gray-400'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
                    </div>
                    <div>
                      <div [class]="userType === 'BUYER' ? 'font-semibold text-green-700 text-sm' : 'font-semibold text-gray-600 text-sm'">Acheteur</div>
                      <div class="text-xs text-gray-400">Acheter des produits</div>
                    </div>
                  </div>
                </button>
                <button type="button" (click)="userType = 'FARMER'"
                  [class]="userType === 'FARMER' ? 'p-4 border-2 border-green-500 rounded-xl bg-green-50 text-left transition-all' : 'p-4 border-2 border-gray-200 rounded-xl bg-gray-50 hover:border-gray-300 text-left transition-all'">
                  <div class="flex items-center gap-3">
                    <div [class]="userType === 'FARMER' ? 'w-9 h-9 rounded-xl bg-green-100 flex items-center justify-center' : 'w-9 h-9 rounded-xl bg-gray-200 flex items-center justify-center'">
                      <svg [class]="userType === 'FARMER' ? 'w-5 h-5 text-green-600' : 'w-5 h-5 text-gray-400'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                    </div>
                    <div>
                      <div [class]="userType === 'FARMER' ? 'font-semibold text-green-700 text-sm' : 'font-semibold text-gray-600 text-sm'">Agriculteur</div>
                      <div class="text-xs text-gray-400">Vendre mes recoltes</div>
                    </div>
                  </div>
                </button>
              </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">Prenom</label>
                <input type="text" [(ngModel)]="firstName" name="firstName" required placeholder="Ahmed"
                  class="w-full px-4 py-3 border border-gray-200 rounded-xl bg-gray-50 focus:ring-2 focus:ring-green-500 focus:bg-white focus:border-green-300 transition text-sm" />
              </div>
              <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">Nom</label>
                <input type="text" [(ngModel)]="lastName" name="lastName" required placeholder="Ben Ali"
                  class="w-full px-4 py-3 border border-gray-200 rounded-xl bg-gray-50 focus:ring-2 focus:ring-green-500 focus:bg-white focus:border-green-300 transition text-sm" />
              </div>
            </div>

            <div>
              <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">Adresse email</label>
              <div class="relative">
                <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                </span>
                <input type="email" [(ngModel)]="email" name="email" required placeholder="votre@email.com"
                  class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl bg-gray-50 focus:ring-2 focus:ring-green-500 focus:bg-white focus:border-green-300 transition text-sm" />
              </div>
            </div>

            <div>
              <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">Telephone</label>
              <div class="relative">
                <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
                </span>
                <input type="tel" [(ngModel)]="phone" name="phone" placeholder="+216 XX XXX XXX"
                  class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl bg-gray-50 focus:ring-2 focus:ring-green-500 focus:bg-white focus:border-green-300 transition text-sm" />
              </div>
            </div>

            <div *ngIf="userType === 'FARMER'" class="space-y-4 p-4 bg-green-50 rounded-xl border border-green-100">
              <div class="flex items-center gap-2">
                <svg class="w-4 h-4 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                <h3 class="text-sm font-semibold text-green-700">Informations de la ferme</h3>
              </div>
              <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">Nom de la ferme</label>
                <input type="text" [(ngModel)]="farmName" name="farmName" placeholder="Ferme des Oliviers"
                  class="w-full px-4 py-3 border border-green-200 rounded-xl bg-white focus:ring-2 focus:ring-green-500 focus:border-green-300 transition text-sm" />
              </div>
            </div>

            <button type="button" (click)="nextStep()"
              class="w-full py-3.5 bg-gradient-to-r from-green-700 to-green-600 text-white rounded-xl font-bold text-sm hover:shadow-lg hover:from-green-800 hover:to-green-700 transition-all flex items-center justify-center gap-2">
              Continuer
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
            </button>
          </div>

          <!-- Step 2: Password -->
          <div *ngIf="currentStep === 2" class="space-y-5">
            <div>
              <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">Nouveau mot de passe</label>
              <div class="relative">
                <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                </span>
                <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password"
                  name="password" required placeholder="Min. 8 caracteres"
                  class="w-full pl-10 pr-12 py-3 border border-gray-200 rounded-xl bg-gray-50 focus:ring-2 focus:ring-green-500 focus:bg-white focus:border-green-300 transition text-sm" />
                <button type="button" (click)="showPassword = !showPassword"
                  class="absolute right-3.5 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                  <svg *ngIf="!showPassword" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                  <svg *ngIf="showPassword" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
                </button>
              </div>
            </div>

            <div>
              <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">Confirmer le mot de passe</label>
              <div class="relative">
                <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
                </span>
                <input [type]="showConfirmPassword ? 'text' : 'password'" [(ngModel)]="confirmPassword"
                  name="confirmPassword" required placeholder="Retapez votre mot de passe"
                  class="w-full pl-10 pr-12 py-3 border border-gray-200 rounded-xl bg-gray-50 focus:ring-2 focus:ring-green-500 focus:bg-white focus:border-green-300 transition text-sm" />
                <button type="button" (click)="showConfirmPassword = !showConfirmPassword"
                  class="absolute right-3.5 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                  <svg *ngIf="!showConfirmPassword" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                  <svg *ngIf="showConfirmPassword" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
                </button>
              </div>
            </div>

            <label class="flex items-start gap-3 cursor-pointer p-3 rounded-xl hover:bg-gray-50 transition">
              <input type="checkbox" [(ngModel)]="acceptTerms" name="acceptTerms" class="mt-0.5 w-4 h-4 text-green-600 border-gray-300 rounded focus:ring-green-500" />
              <span class="text-sm text-gray-600">J'accepte les <a routerLink="/terms" class="text-green-600 hover:underline font-medium">conditions d'utilisation</a> et la <a routerLink="/privacy" class="text-green-600 hover:underline font-medium">politique de confidentialite</a></span>
            </label>

            <div class="flex gap-3 pt-2">
              <button type="button" (click)="prevStep()"
                class="flex-1 py-3.5 border-2 border-gray-200 rounded-xl font-semibold text-sm text-gray-600 hover:border-gray-300 hover:bg-gray-50 transition-all flex items-center justify-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                Retour
              </button>
              <button type="submit" [disabled]="loading"
                class="flex-1 py-3.5 bg-gradient-to-r from-green-700 to-green-600 text-white rounded-xl font-bold text-sm hover:shadow-lg hover:from-green-800 hover:to-green-700 transition-all flex items-center justify-center gap-2 disabled:opacity-50">
                <svg *ngIf="loading" class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
                <span *ngIf="!loading">Creer mon compte</span>
                <span *ngIf="loading">Creation...</span>
              </button>
            </div>
          </div>
        </form>
      </div>

      <div class="bg-gray-50 px-8 py-5 border-t border-gray-100">
        <p class="text-center text-sm text-gray-600">
          Vous avez un compte ?
          <a routerLink="/auth/login" class="text-green-600 hover:text-green-700 font-semibold ml-1">Se connecter</a>
        </p>
      </div>
    </div>
  </div>
</div>
