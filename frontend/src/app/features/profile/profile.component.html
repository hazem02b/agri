<div class="min-h-screen bg-gray-50 py-8">
  <div class="max-w-4xl mx-auto px-4">
    <!-- Header -->
    <div class="mb-6">
      <h1 class="text-3xl font-bold text-gray-900">Mon Profil</h1>
      <p class="text-gray-600 mt-2">Gérez vos informations personnelles</p>
    </div>

    <!-- Loading -->
    <div *ngIf="loading" class="bg-white rounded-lg shadow p-12 text-center">
      <div class="inline-block w-12 h-12 border-4 border-green-600 border-t-transparent rounded-full animate-spin"></div>
      <p class="mt-4 text-gray-600">Chargement...</p>
    </div>

    <div *ngIf="!loading && user" class="space-y-6">
      <!-- Profile Information -->
      <div class="bg-white rounded-lg shadow">
        <div class="p-6 border-b border-gray-200 flex justify-between items-center">
          <h2 class="text-xl font-bold text-gray-900">Informations personnelles</h2>
          <button 
            *ngIf="!editMode"
            (click)="toggleEditMode()"
            class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">
            Modifier
          </button>
          <div *ngIf="editMode" class="flex gap-2">
            <button 
              (click)="toggleEditMode()"
              class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">
              Annuler
            </button>
            <button 
              (click)="saveProfile()"
              class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">
              Enregistrer
            </button>
          </div>
        </div>

        <div class="p-6">
          <form class="space-y-6">
            <!-- Personal Info -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Prénom</label>
                <input 
                  [(ngModel)]="profileForm.firstName" 
                  name="firstName"
                  type="text"
                  [disabled]="!editMode"
                  class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 disabled:bg-gray-100">
              </div>
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Nom</label>
                <input 
                  [(ngModel)]="profileForm.lastName"
                  name="lastName" 
                  type="text"
                  [disabled]="!editMode"
                  class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 disabled:bg-gray-100">
              </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Email</label>
                <input 
                  [(ngModel)]="profileForm.email"
                  name="email"
                  type="email"
                  [disabled]="!editMode"
                  class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 disabled:bg-gray-100">
              </div>
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Téléphone</label>
                <input 
                  [(ngModel)]="profileForm.phone"
                  name="phone"
                  type="tel"
                  [disabled]="!editMode"
                  class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 disabled:bg-gray-100">
              </div>
            </div>

            <!-- Address -->
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2">Adresse</label>
              <input 
                [(ngModel)]="profileForm.address"
                name="address"
                type="text"
                [disabled]="!editMode"
                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 disabled:bg-gray-100">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Ville</label>
                <input 
                  [(ngModel)]="profileForm.city"
                  name="city"
                  type="text"
                  [disabled]="!editMode"
                  class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 disabled:bg-gray-100">
              </div>
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Code postal</label>
                <input 
                  [(ngModel)]="profileForm.postalCode"
                  name="postalCode"
                  type="text"
                  [disabled]="!editMode"
                  class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 disabled:bg-gray-100">
              </div>
            </div>

            <!-- Farm Info (for farmers only) -->
            <div *ngIf="isFarmer()" class="border-t border-gray-200 pt-6 mt-6">
              <h3 class="text-lg font-bold text-gray-900 mb-4">Informations de la ferme</h3>
              
              <div class="space-y-4">
                <div>
                  <label class="block text-sm font-semibold text-gray-700 mb-2">Nom de la ferme</label>
                  <input 
                    [(ngModel)]="profileForm.farmName"
                    name="farmName"
                    type="text"
                    [disabled]="!editMode"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 disabled:bg-gray-100">
                </div>

                <div>
                  <label class="block text-sm font-semibold text-gray-700 mb-2">Description</label>
                  <textarea 
                    [(ngModel)]="profileForm.farmDescription"
                    name="farmDescription"
                    rows="3"
                    [disabled]="!editMode"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 disabled:bg-gray-100 resize-none"></textarea>
                </div>

                <div>
                  <label class="block text-sm font-semibold text-gray-700 mb-2">Taille (en hectares)</label>
                  <input 
                    [(ngModel)]="profileForm.farmSize"
                    name="farmSize"
                    type="number"
                    step="0.1"
                    [disabled]="!editMode"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 disabled:bg-gray-100">
                </div>
              </div>
            </div>
          </form>
        </div>
      </div>

      <!-- Password Change -->
      <div class="bg-white rounded-lg shadow">
        <div class="p-6 border-b border-gray-200 flex justify-between items-center">
          <h2 class="text-xl font-bold text-gray-900">Sécurité</h2>
          <button 
            *ngIf="!showPasswordForm"
            (click)="showPasswordForm = true"
            class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">
            Changer le mot de passe
          </button>
        </div>

        <div *ngIf="showPasswordForm" class="p-6">
          <form class="space-y-4">
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2">Mot de passe actuel</label>
              <input 
                [(ngModel)]="passwordForm.currentPassword"
                name="currentPassword"
                type="password"
                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500">
            </div>

            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2">Nouveau mot de passe</label>
              <input 
                [(ngModel)]="passwordForm.newPassword"
                name="newPassword"
                type="password"
                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500">
            </div>

            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2">Confirmer le mot de passe</label>
              <input 
                [(ngModel)]="passwordForm.confirmPassword"
                name="confirmPassword"
                type="password"
                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500">
            </div>

            <div class="flex gap-2 pt-4">
              <button 
                type="button"
                (click)="showPasswordForm = false"
                class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">
                Annuler
              </button>
              <button 
                type="button"
                (click)="changePassword()"
                class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">
                Enregistrer
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
