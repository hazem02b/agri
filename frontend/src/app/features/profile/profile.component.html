<div class="min-h-screen bg-gray-50 py-8">
  <div class="max-w-4xl mx-auto px-4">
    <!-- Header -->
    <div class="mb-6">
      <h1 class="text-3xl font-bold text-gray-900">Mon Profil</h1>
      <p class="text-gray-600 mt-2">Gérez vos informations personnelles</p>
    </div>

    <!-- Loading -->
    <div *ngIf="loading" class="bg-white rounded-lg shadow p-12 text-center">
      <div class="inline-block w-12 h-12 border-4 border-green-600 border-t-transparent rounded-full animate-spin"></div>
      <p class="mt-4 text-gray-600">Chargement...</p>
    </div>

    <div *ngIf="!loading && user" class="space-y-6">
      <!-- Profile Information -->
      <div class="bg-white rounded-lg shadow">
        <div class="p-6 border-b border-gray-200 flex justify-between items-center">
          <h2 class="text-xl font-bold text-gray-900">Informations personnelles</h2>
          <button 
            *ngIf="!editMode"
            (click)="toggleEditMode()"
            class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">
            Modifier
          </button>
          <div *ngIf="editMode" class="flex gap-2">
            <button 
              (click)="toggleEditMode()"
              class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">
              Annuler
            </button>
            <button 
              (click)="saveProfile()"
              class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">
              Enregistrer
            </button>
          </div>
        </div>

        <div class="p-6">
          <!-- Avatar upload -->
          <div class="flex flex-col items-center mb-6 pb-6 border-b border-gray-100">
            <div class="relative group cursor-pointer" (click)="photoInput.click()">
              <img
                *ngIf="selectedPhoto || user?.profileImage"
                [src]="selectedPhoto || user?.profileImage"
                class="w-24 h-24 rounded-full object-cover border-4 border-green-200 shadow">
              <div
                *ngIf="!selectedPhoto && !user?.profileImage"
                class="w-24 h-24 rounded-full bg-green-100 border-4 border-green-200 shadow flex items-center justify-center text-3xl font-bold text-green-700">
                {{ (user?.firstName || '?').charAt(0).toUpperCase() }}{{ (user?.lastName || '').charAt(0).toUpperCase() }}
              </div>
              <div class="absolute inset-0 rounded-full bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex flex-col items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                <span class="text-white text-xs mt-1 font-medium">Modifier</span>
              </div>
            </div>
            <input #photoInput type="file" accept="image/jpeg,image/png,image/webp" class="hidden" (change)="onPhotoSelected($event)">
            <div *ngIf="photoUploading" class="mt-2 flex items-center gap-2 text-green-600 text-sm">
              <div class="w-4 h-4 border-2 border-green-600 border-t-transparent rounded-full animate-spin"></div>
              <span>Mise à jour en cours...</span>
            </div>
            <p *ngIf="!photoUploading" class="text-xs text-gray-400 mt-2">Cliquez pour modifier la photo</p>
          </div>

          <form class="space-y-6">
            <!-- Personal Info -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Prénom</label>
                <input 
                  [(ngModel)]="profileForm.firstName" 
                  name="firstName"
                  type="text"
                  [disabled]="!editMode"
                  class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 disabled:bg-gray-100">
              </div>
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Nom</label>
                <input 
                  [(ngModel)]="profileForm.lastName"
                  name="lastName" 
                  type="text"
                  [disabled]="!editMode"
                  class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 disabled:bg-gray-100">
              </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Email</label>
                <input 
                  [(ngModel)]="profileForm.email"
                  name="email"
                  type="email"
                  [disabled]="!editMode"
                  class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 disabled:bg-gray-100">
              </div>
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Téléphone</label>
                <input 
                  [(ngModel)]="profileForm.phone"
                  name="phone"
                  type="tel"
                  [disabled]="!editMode"
                  class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 disabled:bg-gray-100">
              </div>
            </div>

            <!-- Address -->
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2">Adresse</label>
              <input 
                [(ngModel)]="profileForm.address"
                name="address"
                type="text"
                [disabled]="!editMode"
                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 disabled:bg-gray-100">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Ville</label>
                <input 
                  [(ngModel)]="profileForm.city"
                  name="city"
                  type="text"
                  [disabled]="!editMode"
                  class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 disabled:bg-gray-100">
              </div>
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Code postal</label>
                <input 
                  [(ngModel)]="profileForm.postalCode"
                  name="postalCode"
                  type="text"
                  [disabled]="!editMode"
                  class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 disabled:bg-gray-100">
              </div>
            </div>


          </form>
        </div>
      </div>

      <!-- Password Change -->
      <div class="bg-white rounded-lg shadow">
        <div class="p-6 border-b border-gray-200 flex justify-between items-center">
          <h2 class="text-xl font-bold text-gray-900">Sécurité</h2>
          <button 
            *ngIf="!showPasswordForm"
            (click)="showPasswordForm = true"
            class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">
            Changer le mot de passe
          </button>
        </div>

        <div *ngIf="showPasswordForm" class="p-6">
          <form class="space-y-4">
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2">Mot de passe actuel</label>
              <input 
                [(ngModel)]="passwordForm.currentPassword"
                name="currentPassword"
                type="password"
                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500">
            </div>

            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2">Nouveau mot de passe</label>
              <input 
                [(ngModel)]="passwordForm.newPassword"
                name="newPassword"
                type="password"
                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500">
            </div>

            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2">Confirmer le mot de passe</label>
              <input 
                [(ngModel)]="passwordForm.confirmPassword"
                name="confirmPassword"
                type="password"
                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500">
            </div>

            <div class="flex gap-2 pt-4">
              <button 
                type="button"
                (click)="showPasswordForm = false"
                class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">
                Annuler
              </button>
              <button 
                type="button"
                (click)="changePassword()"
                class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">
                Enregistrer
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
