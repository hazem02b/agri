server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      routes:
        - id: auth-service-1
          uri: http://agri-auth-service:8081
          predicates:
            - Path=/api/auth/**
            
        - id: auth-service-2
          uri: http://agri-auth-service:8081
          predicates:
            - Path=/api/users/**
            
        - id: auth-service-3
          uri: http://agri-auth-service:8081
          predicates:
            - Path=/api/farmers/**
            
        - id: product-service-1
          uri: http://agri-product-service:8082
          predicates:
            - Path=/api/products/**
            
        - id: product-service-2
          uri: http://agri-product-service:8082
          predicates:
            - Path=/api/jobs/**
            
        - id: product-service-3
          uri: http://agri-product-service:8082
          predicates:
            - Path=/api/stats/**
            
        - id: order-service-1
          uri: http://agri-order-service:8083
          predicates:
            - Path=/api/orders/**
            
        - id: order-service-2
          uri: http://agri-order-service:8083
          predicates:
            - Path=/api/messages/**
            
        - id: order-service-3
          uri: http://agri-order-service:8083
          predicates:
            - Path=/api/delivery/**
            
        - id: order-service-4
          uri: http://agri-order-service:8083
          predicates:
            - Path=/api/payments/**
            
        - id: order-service-ws
          uri: ws://agri-order-service:8083
          predicates:
            - Path=/ws/**

management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway
  endpoint:
    health:
      show-details: always
