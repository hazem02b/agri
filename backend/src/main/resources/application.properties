# Application Configuration
spring.application.name=Agricultural Marketplace Platform
server.port=8081

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/agricultural_marketplace
spring.data.mongodb.database=agricultural_marketplace

# JWT Configuration
jwt.secret=YourSuperSecretKeyForJWTTokenGenerationMustBeLongEnoughForHS512Algorithm
jwt.expiration=86400000

# CORS Configuration
cors.allowed.origins=http://localhost:4200

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging Configuration
logging.level.root=INFO
logging.level.com.agricultural.marketplace=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# ============================================================
# Configuration Email SMTP (Gmail)
# Remplacez par vos vraies credentials Gmail
# 1. Activez "Validation en 2 etapes" sur votre compte Gmail
# 2. Allez dans Securite > Mots de passe des applications
# 3. Generez un mot de passe pour "Application Mail"
# 4. Mettez ce mot de passe dans spring.mail.password
# ============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=Hazembellili80@gmail.com
spring.mail.password=METTRE_ICI_MOT_DE_PASSE_APPLICATION_GMAIL
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
app.reset-code.expiry-minutes=15

